<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Platformer</title>
    <style>
        body {
            margin: 0; background-color: #a0d8ef;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: Arial, sans-serif; overflow: hidden;
        }
        canvas { background-color: #bde0fe; border: 4px solid #333; border-radius: 10px; }
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 20px;
            border-radius: 5px; font-size: 20px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span> | Boost: <span id="boost">Aucun</span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gravity = 0.6;
let score = 0;

const player = {
    x: 100, y: 300, width: 32, height: 32,
    vx: 0, vy: 0, speed: 5, jumpForce: 12,
    grounded: false, hasBoost: false, boostTimer: 0
};

const keys = { Left: false, Right: false, Up: false };

const platforms = [
    { x: 0, y: 450, width: 800, height: 50 },
    { x: 200, y: 350, width: 150, height: 20 },
    { x: 450, y: 280, width: 150, height: 20 },
    { x: 150, y: 200, width: 120, height: 20 }
];

let enemies = [
    { x: 250, y: 320, width: 25, height: 25, vx: 1.5, minX: 200, maxX: 320 },
    { x: 500, y: 250, width: 25, height: 25, vx: -2, minX: 450, maxX: 580 }
];

let items = [{ x: 200, y: 160, width: 20, height: 20, active: true }];

window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === "d") keys.Right = true;
    if (e.key === "ArrowLeft" || e.key === "q") keys.Left = true;
    if (e.key === "ArrowUp" || e.key === " " || e.key === "z") keys.Up = true;
});
window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowRight" || e.key === "d") keys.Right = false;
    if (e.key === "ArrowLeft" || e.key === "q") keys.Left = false;
    if (e.key === "ArrowUp" || e.key === " " || e.key === "z") keys.Up = false;
});

function checkCollision(r1, r2) {
    return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
}

function update() {
    if (keys.Right) player.vx = player.speed;
    else if (keys.Left) player.vx = -player.speed;
    else player.vx = 0;

    if (keys.Up && player.grounded) { player.vy = -player.jumpForce; player.grounded = false; }

    player.vy += gravity; player.x += player.vx; player.y += player.vy;

    if (player.hasBoost) {
        player.boostTimer--;
        if (player.boostTimer <= 0) { player.hasBoost = false; player.jumpForce = 12; document.getElementById("boost").innerText = "Aucun"; }
    }

    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    player.grounded = false;

    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.vy > 0 && player.y + player.height - player.vy <= plat.y + 5) {
                player.y = plat.y - player.height; player.vy = 0; player.grounded = true;
            }
        }
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        let enemy = enemies[i];
        enemy.x += enemy.vx;
        if (enemy.x > enemy.maxX || enemy.x < enemy.minX) enemy.vx *= -1;

        if (checkCollision(player, enemy)) {
            if (player.vy > 0 && player.y + player.height - player.vy <= enemy.y + 10) {
                enemies.splice(i, 1); player.vy = -8; score += 10;
                document.getElementById("score").innerText = score;
            } else {
                alert("Game Over !"); player.x = 100; player.y = 300; player.vy = 0;
            }
        }
    }

    for (let item of items) {
        if (item.active && checkCollision(player, item)) {
            item.active = false; player.hasBoost = true; player.boostTimer = 300; player.jumpForce = 17;
            document.getElementById("boost").innerText = "Super Saut 🚀";
        }
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#4ade80";
    for (let plat of platforms) ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    
    ctx.fillStyle = "#facc15";
    for (let item of items) if (item.active) ctx.fillRect(item.x, item.y, item.width, item.height);

    ctx.fillStyle = "#a855f7";
    for (let enemy of enemies) {
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
        ctx.fillStyle = "#fff"; ctx.fillRect(enemy.x + 4, enemy.y + 6, 4, 4); ctx.fillRect(enemy.x + 14, enemy.y + 6, 4, 4);
        ctx.fillStyle = "#a855f7";
    }

    ctx.fillStyle = "#f87171";
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.fillStyle = "#fff"; ctx.fillRect(player.x + 6, player.y + 8, 6, 6); ctx.fillRect(player.x + 18, player.y + 8, 6, 6);
    ctx.fillStyle = "#000"; ctx.fillRect(player.x + 9, player.y + 11, 3, 3); ctx.fillRect(player.x + 21, player.y + 11, 3, 3);
}

update();
</script>
</body>
</html>
